<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reseñas | La Hacienda</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/resenas.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="logo">
            <img src="../img/logo.jpg" alt="Logo">
        </div>

        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="menu.html">Menú</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li class="active"><a href="resenas.html">Reseñas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>

    </header>

    <!-- RESEÑAS -->
    <section class="resenas">

    <div class="titulo-resenas">

        <h2>Reseñas</h2>

        <p>Lo que dicen nuestros visitantes</p>

    </div>

    <div
        class="contenedor-resenas"
        id="contenedorResenas">
    </div>

    <div class="contenedor-boton">

        <button id="abrirModal">
            ☆ Deja tu reseña →
        </button>

    </div>

    </section> 

    <!-- MODAL -->
    <div class="modal" id="modal">

    <div class="modal-contenido">

        <span class="cerrar" id="cerrarModal">
            &times;
        </span>

        <h2>Deja tu reseña</h2>

        <form id="formResena">

            <input
                type="text"
                id="nombreResena"
                placeholder="Tu nombre"
                required>

            <div class="calificacion">

                <span class="estrella">★</span>
                <span class="estrella">★</span>
                <span class="estrella">★</span>
                <span class="estrella">★</span>
                <span class="estrella">★</span>

            </div>

            <textarea
                id="comentarioResena"
                placeholder="Escribe tu reseña"
                required>
            </textarea>

            <button type="submit">
                Enviar reseña
            </button>

        </form>

    </div>

</div>

    <!-- JS -->
<script
type="module"
src="../js/resenas.js">
</script>

</body>
</html>
