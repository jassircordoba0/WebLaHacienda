<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú | La Hacienda</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/menu.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="logo">
            <img src="../img/logo.jpg" alt="Logo">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li class="active"><a href="menu.html">Menú</a></li>
                <li><a href="resenas.html">Reseñas</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>

    </header>

    <!-- MENU -->
    <section class="menu">

        <div class="titulo-menu">

            <h2>Nuestro Menú</h2>

            <p>Platos que te encantarán</p>

        </div>

        <!-- FILTROS -->
        <div class="filtros">

            <button class="filtro active" data-filter="all">
                Todo el menú
                <i class="fa-solid fa-utensils"></i>
            </button>

            <button class="filtro" data-filter="comida">
                Comidas
            </button>

            <button class="filtro" data-filter="bebida">
                Bebidas
            </button>

        </div>

        <!-- PRODUCTOS -->
        <div class="contenedor-menu" 
        id="contenedorMenu">
        </div>

    </section>

    <div class="modal-detalle" id="modalDetalle">

    <div class="contenido-modal">

        <span id="cerrarDetalle">&times;</span>

        <img id="detalleImagen">

        <h2 id="detalleNombre"></h2>

        <h3 id="detallePrecio"></h3>

        <p id="detalleDescripcion"></p>

        <h4>Ingredientes</h4>

        <p id="detalleIngredientes"></p>

    </div>

</div>

    <!-- JS -->
<script
type="module"
src="../js/menu.js">
</script>

</body>
</html>
